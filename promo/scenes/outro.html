<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  .stage { position: absolute; inset: 0; display: grid; place-items: center; }
  .stack { text-align: center; }
  .wordmark { font-size: 96px; }
  .tagline { margin-top: 26px; font-family: var(--mono); font-size: 30px;
             color: var(--ink-2); letter-spacing: 0.05em; opacity: 0; }
  .quiet { margin-top: 44px; font-family: var(--mono); font-size: 26px;
           color: var(--green); opacity: 0; }
  .repo { margin-top: 40px; font-family: var(--mono); font-size: 28px;
          color: var(--ink-3); opacity: 0; }
  .repo b { color: var(--cyan); font-weight: 600; }
</style></head>
<body>
  <div class="stage">
    <div class="stack">
      <div class="wordmark"><span class="caret">&gt;</span> JARVIS<span class="caret" id="blink">▌</span></div>
      <div class="tagline">route the work · keep the context · own your attention</div>
      <div class="quiet" id="quiet">● all quiet — the fleet is working</div>
      <div class="repo" id="repo">open source · <b>github.com/gonandrap/agentic_os</b></div>
    </div>
  </div>
  <div id="veil"></div>
<script src="scene.js"></script>
<script>
  const TOTAL = 6.0;
  window.seek = (t) => {
    document.getElementById('blink').style.opacity = caretOn(t) ? 1 : 0;
    const q = document.querySelector('.tagline');
    const qp = easeOut(seg(t, 0.6, 0.6));
    q.style.opacity = qp; q.style.transform = `translateY(${lerp(12,0,qp)}px)`;
    document.getElementById('quiet').style.opacity = easeOut(seg(t, 1.5, 0.6));
    document.getElementById('repo').style.opacity = easeOut(seg(t, 2.2, 0.6));
    edgeFade(t, TOTAL);
  };
</script>
</body></html>
